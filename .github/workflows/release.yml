name: release

# MCP publishes from a new version on public main after its declared client
# dependency is available on npm. Public syncs can land client and MCP in
# parallel, so an hourly retry closes that ordering gap without a maintainer
# pushing tags or manually re-running workflows.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-24.04
    outputs:
      publish: ${{ steps.version.outputs.publish }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - id: version
        name: Detect a releasable unpublished package version
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          node -e "const v=process.argv[1]; if (!/^\\d+\\.\\d+\\.\\d+([+-][0-9A-Za-z.-]+)?$/.test(v)) process.exit(1)" "$version" \
            || { echo "::error::invalid package version: $version"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          if npm view "@littlebigbrain/mcp@${version}" version >/dev/null 2>&1; then
            echo "@littlebigbrain/mcp@${version} is already published; release is a no-op"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          client_range=$(node -p "require('./package.json').dependencies['@littlebigbrain/client']")
          if npm view "@littlebigbrain/client@${client_range}" version >/dev/null 2>&1; then
            echo "client dependency ${client_range} is available; MCP release is required"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "client dependency ${client_range} is not on npm yet; a scheduled run will retry"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  ci:
    needs: [preflight]
    if: ${{ needs.preflight.outputs.publish == 'true' }}
    uses: ./.github/workflows/ci.yml

  publish-npm:
    needs: [preflight, ci]
    if: ${{ needs.preflight.outputs.publish == 'true' }}
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Update npm for trusted publishing
        run: npm install -g npm@^11.5.1
      - run: npm ci
      - run: npm run build
      - name: Verify package version and client dependency
        env:
          EXPECTED_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          actual=$(node -p "require('./package.json').version")
          [ "$actual" = "$EXPECTED_VERSION" ] \
            || { echo "::error::package version $actual != expected $EXPECTED_VERSION"; exit 1; }
          client_range=$(node -p "require('./package.json').dependencies['@littlebigbrain/client']")
          npm view "@littlebigbrain/client@${client_range}" version
      - name: Publish @littlebigbrain/mcp
        run: npm publish

  github-release:
    needs: [preflight, publish-npm]
    if: ${{ needs.preflight.outputs.publish == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create the version tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release $RELEASE_TAG already exists; nothing to do"
          else
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
